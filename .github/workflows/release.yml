name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci

      - name: Resolve version
        working-directory: .
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Validate version matches wxt.config.ts
        run: |
          CONFIG_VERSION=$(grep -oP "^\s+version:\s*'\K[^']+" wxt.config.ts | head -1)
          if [ "$CONFIG_VERSION" != "$VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match wxt.config.ts version ($CONFIG_VERSION)"
            exit 1
          fi

      - run: npx wxt zip -b chrome

      - run: npx wxt build -b firefox

      - name: Sign Firefox extension
        id: sign
        continue-on-error: true
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: node ../.github/scripts/amo-sign.mjs .output/firefox-mv2 ".output/prolific-pulse-extension-${VERSION}-firefox.xpi"

      - name: Create GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS=("src/.output/prolific-pulse-extension-${VERSION}-chrome.zip")
          if [ -f "src/.output/prolific-pulse-extension-${VERSION}-firefox.xpi" ]; then
            ASSETS+=("src/.output/prolific-pulse-extension-${VERSION}-firefox.xpi")
          else
            echo "::warning::Firefox XPI not ready — AMO signing timed out. Run the 'Sign Firefox addon' workflow to attach it later."
          fi
          gh release create "$TAG" "${ASSETS[@]}" \
            --title "Prolific Pulse $TAG" \
            --generate-notes
