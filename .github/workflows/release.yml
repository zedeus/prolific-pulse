name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci

      - name: Resolve version
        working-directory: .
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Validate version matches wxt.config.ts
        run: |
          CONFIG_VERSION=$(grep -oP "^\s+version:\s*'\K[^']+" wxt.config.ts | head -1)
          if [ "$CONFIG_VERSION" != "$VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match wxt.config.ts version ($CONFIG_VERSION)"
            exit 1
          fi

      - run: npx wxt zip -b chrome

      - name: Build and zip Firefox extension
        run: |
          npx wxt build -b firefox
          cd .output/firefox-mv2 && zip -r "../prolific-pulse-extension-${VERSION}-firefox-unsigned.zip" .

      - name: Sign Firefox extension
        id: sign
        continue-on-error: true
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          AMO_POLL_MAX: '4'
        run: node ../.github/scripts/amo-sign.mjs .output/firefox-mv2 ".output/prolific-pulse-extension-${VERSION}-firefox.xpi"

      - name: Create GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS=(
            "src/.output/prolific-pulse-extension-${VERSION}-chrome.zip"
            "src/.output/prolific-pulse-extension-${VERSION}-firefox-unsigned.zip"
          )
          BODY="## Installation

          ### Chrome
          1. Download \`prolific-pulse-extension-${VERSION}-chrome.zip\`.
          2. Go to \`chrome://extensions\`, enable **Developer mode**.
          3. Drag the \`.zip\` onto the page.

          ### Firefox (signed — recommended)
          Install from [AMO](https://addons.mozilla.org/firefox/addon/prolific-pulse/) once approved.

          ### Firefox (unsigned — temporary)
          1. Download \`prolific-pulse-extension-${VERSION}-firefox-unsigned.zip\`.
          2. Open \`about:debugging#/runtime/this-firefox\`.
          3. Click **Load Temporary Add-on** and select the \`.zip\` file.
          4. Note: the extension is removed when Firefox restarts."

          if [ -f "src/.output/prolific-pulse-extension-${VERSION}-firefox.xpi" ]; then
            ASSETS+=("src/.output/prolific-pulse-extension-${VERSION}-firefox.xpi")
            BODY+="

          ### Firefox (signed XPI)
          Download \`prolific-pulse-extension-${VERSION}-firefox.xpi\` and open it in Firefox to install permanently."
          fi

          gh release create "$TAG" "${ASSETS[@]}" \
            --title "Prolific Pulse $TAG" \
            --notes "$BODY"
