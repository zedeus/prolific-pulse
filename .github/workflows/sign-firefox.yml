name: Sign Firefox addon

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.2)'
        required: true

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci

      - name: Resolve version
        working-directory: .
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          VERSION="${VERSION#v}"
          echo "TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - run: npx wxt build -b firefox

      - name: Sign Firefox extension
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: node ../.github/scripts/amo-sign.mjs .output/firefox-mv2 ".output/prolific-pulse-extension-${VERSION}-firefox.xpi"

      - name: Upload Firefox XPI to release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG" \
            "src/.output/prolific-pulse-extension-${VERSION}-firefox.xpi" \
            --clobber
