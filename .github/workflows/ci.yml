name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci

      - run: npx wxt prepare

      - run: npx eslint .

      - name: Type-check
        run: npx svelte-check
        continue-on-error: true

      - run: npx vitest run

      - run: npx wxt build -b chrome

      - run: npx wxt build -b firefox
